{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}

<div class="signup-container">
    <div class="signup-card">
<style>
    body {
        background-color: #f0f2f5;
        font-family: 'Segoe UI', Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .signup-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 450px;
        text-align: center;
    }

    h2 {
        color: #1c1e21;
        margin-bottom: 25px;
    }

    /* Target Django's form paragraphs */
    form p {
        text-align: left; /* Keep labels and inputs left-aligned */
        margin-bottom: 20px;
        font-weight: 600;
        color: #4b4f56;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #dddfe2;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
    }

    /* Clean up the messy help text and lists */
    .helptext, .helptext ul {
        font-size: 0.8rem;
        color: #8d949e;
        font-weight: normal;
        margin-top: 5px;
        padding-left: 20px;
    }

    .btn-signup {
        width: 100%;
        background-color: #28a745;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-signup:hover {
        background-color: #218838;
    }

    .login-link {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #606770;
    }

    .login-link a {
        color: #007bff;
        text-decoration: none;
    }
</style>

        <h2>Create an Account</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="{% url 'login' %}">Log in here</a>.
        </p>
    </div>
</div>
