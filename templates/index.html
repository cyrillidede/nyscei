  <script>
    const menuToggle = document.getElementById('menuToggle');
const navOverlay = document.getElementById('navOverlay');

menuToggle.addEventListener('click', () => {
  menuToggle.classList.toggle('active');
  navOverlay.classList.toggle('open');
});

// Close menu when a link is clicked
const links = document.querySelectorAll('.nav-links a');
links.forEach(link => {
  link.addEventListener('click', () => {
    menuToggle.classList.remove('active');
    navOverlay.classList.remove('open');
  });
});

  </script>

<script>
    function startSlideshow(containerClass, interval=3000) {
    const slides = document.querySelectorAll(`.${containerClass} img`);
    let index = 0;

    function showSlide(i) {
        slides.forEach((slide, idx) => {
            slide.classList.toggle('active', idx === i);
        });
    }

    showSlide(index);
    setInterval(() => {
        index = (index + 1) % slides.length;
        showSlide(index);
    }, interval);
}

// Initialize all four
startSlideshow('praise-worship');
startSlideshow('intercessory');
startSlideshow('media');
startSlideshow('protocol');
</script>
