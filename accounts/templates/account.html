{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account </title>
  <link rel="stylesheet" type="text/css" href="{% static 'account.css'%}">
</head>
<body>

  <!-- Top navigation -->
     <header>
    <div class="logo"><img src="{% static 'logo.jpg' %}" width="65" height="65"></div>

  <button class="menu-toggle" id="menuToggle">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
  </button>

    <nav class="nav-overlay" id="navOverlay">
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="{% url 'activities' %}">Activities</a></li>
        <li><a href="{% url 'leadership' %}">Leadership</a></li>
        <li><a href="#">Contacts</a></li>
        <li><a href="{% url 'account' %}">Account</a></li>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button>log out</button>
            </form>
        {% else %}
            <button>
            <a href="{% url 'login' %}">Login</a>
            </button>
        {% endif %}

      </ul>
    </nav>
  <script>
    const menuToggle = document.getElementById('menuToggle');
const navOverlay = document.getElementById('navOverlay');

menuToggle.addEventListener('click', () => {
  menuToggle.classList.toggle('active');
  navOverlay.classList.toggle('open');
});

// Close menu when a link is clicked
const links = document.querySelectorAll('.nav-links a');
links.forEach(link => {
  link.addEventListener('click', () => {
    menuToggle.classList.remove('active');
    navOverlay.classList.remove('open');
  });
});

  </script>
  </header>
<main>
  <!-- Layout -->
  <div class="container">
   

    <!-- Main content -->
    <div class="main">
      <div class="section">
        <h2>Basic Info</h2>
        <div class="field">
          <label>Profile Picture</label>
          <input type="file">
        </div>
        <div class="field">
          <label>Name</label>
          <input type="text" value="{{profile.username}}">
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input type="date" value="1998-09-28">
        </div>
        <div class="field">
          <label>Gender</label>
          <input type="text" value="Male">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" value="{{profile.email}}">
        </div>
      </div>

      <div class="section">
        <h2>Account Info</h2>
        <div class="field">
          <label>Username</label>
          <input type="text" value="{{profile.username}}">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" value="**********">
        </div>
      </div>
{% block content %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update</button>
</form>
{% endblock %}
</main>
      <footer>
    <p>&copy; 2026 NYSCEI </p>
     <label><img src ="{%static 'fb.jpeg' %}" width="25" height="25" &nbsp>Facebook</label>
    <label><img src ="{%static 'tik.jpg' %}" width="25" height="25" &nbsp>Tik Tok</label>
    <label><img src ="{%static 'yt.jpeg' %}" width="25" height="25" &nbsp>Youtube</label>
  </footer>
    </div>
  </div>

</body>
</html>
